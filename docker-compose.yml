services:
  controller:
    build:
      context: .
      dockerfile: Dockerfile
    image: sdn-security-controller:latest
    container_name: sdn-security-controller
    ports:
      - "${SDN_OPENFLOW_PORT_HOST:-6633}:6633"
    environment:
      SDN_LOG_LEVEL: "INFO"
      SDN_IDS_ENABLED: "${SDN_IDS_ENABLED:-true}"
      SDN_ML_ENABLED: "${SDN_ML_ENABLED:-false}"
      SDN_IDS_MODE: "${SDN_IDS_MODE:-threshold}"
      SDN_IDS_MODE_STATE_PATH: "${SDN_IDS_MODE_STATE_PATH:-runtime/ids_mode_state.json}"
      SDN_MITIGATION_ENABLED: "${SDN_MITIGATION_ENABLED:-true}"
      SDN_ML_MODE: "${SDN_ML_MODE:-threshold_only}"
      SDN_ML_HYBRID_POLICY: "${SDN_ML_HYBRID_POLICY:-layered_consensus}"
      SDN_ML_ENABLE_RANDOM_FOREST: "${SDN_ML_ENABLE_RANDOM_FOREST:-true}"
      SDN_ML_ENABLE_ISOLATION_FOREST: "${SDN_ML_ENABLE_ISOLATION_FOREST:-true}"
      SDN_ML_HYBRID_BLOCK_ENABLED: "${SDN_ML_HYBRID_BLOCK_ENABLED:-true}"
      SDN_ML_HYBRID_ANOMALY_BLOCK_ENABLED: "${SDN_ML_HYBRID_ANOMALY_BLOCK_ENABLED:-true}"
      SDN_ML_REQUIRE_THRESHOLD_FOR_ML_BLOCK: "${SDN_ML_REQUIRE_THRESHOLD_FOR_ML_BLOCK:-false}"
      SDN_ML_MODEL_PATH: "${SDN_ML_MODEL_PATH:-models/random_forest_runtime_final.joblib}"
      SDN_ML_ANOMALY_MODEL_PATH: "${SDN_ML_ANOMALY_MODEL_PATH:-}"
      SDN_ML_INFERENCE_MODE: "${SDN_ML_INFERENCE_MODE:-classifier_only}"
      SDN_ML_FEATURE_WINDOW_SECONDS: "${SDN_ML_FEATURE_WINDOW_SECONDS:-3}"
      SDN_ML_UNANSWERED_SYN_TIMEOUT_SECONDS: "${SDN_ML_UNANSWERED_SYN_TIMEOUT_SECONDS:-1.5}"
      SDN_ML_MINIMUM_PACKETS_BEFORE_INFERENCE: "${SDN_ML_MINIMUM_PACKETS_BEFORE_INFERENCE:-6}"
      SDN_ML_INFERENCE_PACKET_STRIDE: "${SDN_ML_INFERENCE_PACKET_STRIDE:-2}"
      SDN_ML_INFERENCE_COOLDOWN_SECONDS: "${SDN_ML_INFERENCE_COOLDOWN_SECONDS:-0.5}"
      SDN_ML_DATASET_RECORDING_ENABLED: "${SDN_ML_DATASET_RECORDING_ENABLED:-false}"
      SDN_ML_DATASET_RECORDING_PATH: "${SDN_ML_DATASET_RECORDING_PATH:-runtime/ml_dataset.jsonl}"
      SDN_ML_DATASET_LABEL_PATH: "${SDN_ML_DATASET_LABEL_PATH:-runtime/dataset_label.json}"
      SDN_ML_DATASET_RECORD_UNLABELED: "${SDN_ML_DATASET_RECORD_UNLABELED:-false}"
      SDN_ML_DATASET_DISABLE_MITIGATION: "${SDN_ML_DATASET_DISABLE_MITIGATION:-false}"
      SDN_ML_CONFIDENCE_THRESHOLD: "${SDN_ML_CONFIDENCE_THRESHOLD:-0.65}"
      SDN_ML_MITIGATION_THRESHOLD: "${SDN_ML_MITIGATION_THRESHOLD:-0.80}"
      SDN_ML_ALERT_ONLY_THRESHOLD: "${SDN_ML_ALERT_ONLY_THRESHOLD:-0.55}"
      SDN_ML_ANOMALY_SCORE_THRESHOLD: "${SDN_ML_ANOMALY_SCORE_THRESHOLD:-0.60}"
      SDN_ML_HYBRID_CLASSIFIER_BLOCK_THRESHOLD: "${SDN_ML_HYBRID_CLASSIFIER_BLOCK_THRESHOLD:-0.80}"
      SDN_ML_RF_BLOCK_CONFIDENCE: "${SDN_ML_RF_BLOCK_CONFIDENCE:-0.80}"
      SDN_ML_HYBRID_ANOMALY_SUPPORT_THRESHOLD: "${SDN_ML_HYBRID_ANOMALY_SUPPORT_THRESHOLD:-0.60}"
      SDN_ML_HYBRID_BLOCK_REPEAT_COUNT: "${SDN_ML_HYBRID_BLOCK_REPEAT_COUNT:-2}"
      SDN_ML_HYBRID_KNOWN_FAMILY_BLOCK_ENABLED: "${SDN_ML_HYBRID_KNOWN_FAMILY_BLOCK_ENABLED:-true}"
      SDN_ML_HYBRID_BLOCK_ELIGIBLE_FAMILIES: "${SDN_ML_HYBRID_BLOCK_ELIGIBLE_FAMILIES:-}"
      SDN_ML_HYBRID_ANOMALY_TREND_THRESHOLD: "${SDN_ML_HYBRID_ANOMALY_TREND_THRESHOLD:-0.05}"
      SDN_ML_HYBRID_ANOMALY_ONLY_BLOCK_ENABLED: "${SDN_ML_HYBRID_ANOMALY_ONLY_BLOCK_ENABLED:-false}"
      SDN_ML_HYBRID_ANOMALY_ONLY_BLOCK_THRESHOLD: "${SDN_ML_HYBRID_ANOMALY_ONLY_BLOCK_THRESHOLD:-0.85}"
      SDN_ML_ANOMALY_ONLY_BLOCK_ENABLED: "${SDN_ML_ANOMALY_ONLY_BLOCK_ENABLED:-false}"
      SDN_ML_ANOMALY_BLOCK_THRESHOLD: "${SDN_ML_ANOMALY_BLOCK_THRESHOLD:-0.85}"
      SDN_ML_HYBRID_CORRELATION_WINDOW_SECONDS: "${SDN_ML_HYBRID_CORRELATION_WINDOW_SECONDS:-10}"
      SDN_ML_ALERT_SUPPRESSION_SECONDS: "${SDN_ML_ALERT_SUPPRESSION_SECONDS:-20}"
      SDN_ML_ONLY_ESCALATION_COUNT: "${SDN_ML_ONLY_ESCALATION_COUNT:-3}"
      SDN_ML_ANOMALY_ONLY_ESCALATION_COUNT: "${SDN_ML_ANOMALY_ONLY_ESCALATION_COUNT:-3}"
      SDN_ML_ONLY_ESCALATION_ENABLED: "${SDN_ML_ONLY_ESCALATION_ENABLED:-false}"
      SDN_ML_CAPTURE_ON_ML_ONLY_ALERT: "${SDN_ML_CAPTURE_ON_ML_ONLY_ALERT:-true}"
      SDN_FIREWALL_PROTECTED_SOURCE_IPS: "${SDN_FIREWALL_PROTECTED_SOURCE_IPS:-10.0.0.254}"
      SDN_AUTO_UNBLOCK_ENABLED: "${SDN_AUTO_UNBLOCK_ENABLED:-true}"
    volumes:
      - .:/ryu-apps
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: sdn-security-controller:latest
    container_name: sdn-security-dashboard
    command: ["python", "-m", "monitoring.webapp"]
    ports:
      - "${SDN_DASHBOARD_PORT_HOST:-8080}:8080"
    environment:
      SDN_DASHBOARD_HOST: "0.0.0.0"
      SDN_DASHBOARD_PORT: "8080"
    depends_on:
      - controller
    volumes:
      - .:/ryu-apps
    restart: unless-stopped

  mininet:
    build:
      context: .
      dockerfile: Dockerfile.mininet
    image: sdn-security-mininet:latest
    container_name: sdn-security-mininet
    privileged: true
    tty: true
    stdin_open: true
    depends_on:
      - controller
    working_dir: /workspace/ryu-apps
    environment:
      SDN_CONTROLLER_IP: "controller"
      SDN_CONTROLLER_PORT: "6633"
      SDN_MININET_SWITCH_MODE: "user"
    volumes:
      - .:/workspace/ryu-apps
      - /lib/modules:/lib/modules:ro
    command: ["sleep", "infinity"]
